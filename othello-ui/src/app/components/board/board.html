<div class="board-container">
  <div
    class="square"
    *ngFor="let cell of boardFlat; let index = index"
    (click)="onCellClick(getRow(index), getCol(index))"
  >
    <div
      class="piece"
      [ngClass]="{
        white: cell === 1,
        black: cell === -1
      }"
    ></div>
  </div>
</div>
